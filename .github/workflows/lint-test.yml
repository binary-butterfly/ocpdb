name: lint, run unit tests, run integration tests

on:
  pull_request:
    branches: [ "main" ]

  # make workflow "callable" by others
  workflow_call:

env:
  # Use the Python interpreter provided by the container image instead of letting uv download a
  # managed one.
  UV_PYTHON_PREFERENCE: only-system

jobs:
  lint:
    runs-on: ubuntu-latest

    container: python:3.12

    steps:
    - name: checkout
      uses: actions/checkout@v7

    - name: install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.11.18"
        enable-cache: true

    - name: install dependencies
      run: uv sync --frozen

    - name: lint check using ruff
      run: uv run ruff check --output-format github ./webapp ./tests ./migrations

    - name: format check using ruff
      run: uv run ruff format --check ./webapp ./tests ./migrations

  test-unit:
    runs-on: ubuntu-latest

    container: python:3.12

    env:
      TZ: Europe/Berlin

    steps:
    - name: checkout
      uses: actions/checkout@v7

    - name: install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.11.18"
        enable-cache: true

    - name: install dependencies
      run: uv sync --frozen

    - name: run pytest
      run: uv run python -m pytest tests/unit

  test-integration:
    runs-on: ubuntu-latest

    container: python:3.12

    env:
      TZ: Europe/Berlin

    services:
      postgre:
        image: postgis/postgis:15-3.5-alpine
        env:
          POSTGRES_USER: ocpdb
          POSTGRES_PASSWORD: development
          POSTGRES_DB: ocpdb
          PGUSER: ocpdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: checkout
      uses: actions/checkout@v7

    - name: install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.11.18"
        enable-cache: true

    - name: install dependencies
      run: uv sync --frozen

    - name: run pytest
      run: uv run python -m pytest tests/integration
